<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentinel AI - Security Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: 'Inter', sans-serif; }
        .glass-panel { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; }
        .badge-allow { background: rgba(34, 197, 94, 0.2); color: #4ade80; }
        .badge-block { background: rgba(239, 68, 68, 0.2); color: #f87171; }
        .badge-throttle { background: rgba(234, 179, 8, 0.2); color: #facc15; }
    </style>
</head>
<body class="p-6">
    <div class="max-w-7xl mx-auto space-y-6">
        <header class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-emerald-400">Flowra AI Dashboard</h1>
                <p class="text-slate-400">Real-time Inference Security Overview</p>
            </div>
            <button onclick="fetchData()" class="px-4 py-2 bg-blue-600 hover:bg-blue-500 rounded-lg font-medium transition-colors">Refresh Data</button>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
            <div class="glass-panel p-6 flex flex-col justify-center items-center">
                <p class="text-slate-400 text-sm font-medium mb-1">Total Requests</p>
                <div id="stat-total" class="text-4xl font-bold">0</div>
            </div>
            <div class="glass-panel p-6 flex flex-col justify-center items-center">
                <p class="text-slate-400 text-sm font-medium mb-1">Allowed Traffic</p>
                <div id="stat-allow" class="text-4xl font-bold text-emerald-400">0%</div>
            </div>
            <div class="glass-panel p-6 flex flex-col justify-center items-center">
                <p class="text-slate-400 text-sm font-medium mb-1">Blocked / Throttled</p>
                <div id="stat-block" class="text-4xl font-bold text-rose-400">0%</div>
            </div>
            <div class="glass-panel p-6 flex flex-col justify-center items-center">
                <p class="text-slate-400 text-sm font-medium mb-1">Avg Latency</p>
                <div id="stat-latency" class="text-4xl font-bold text-blue-400">0ms</div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <div class="glass-panel p-6">
                <h2 class="text-lg font-semibold mb-4 border-b border-slate-700 pb-2">Recent Traffic Actions</h2>
                <div class="relative h-64">
                    <canvas id="actionChart"></canvas>
                </div>
            </div>
            <div class="glass-panel p-6 flex flex-col h-full overflow-hidden">
                <h2 class="text-lg font-semibold mb-4 border-b border-slate-700 pb-2">Live Security Audit Log</h2>
                <div class="overflow-y-auto flex-1 space-y-3 pr-2 h-64" id="log-container">
                    <!-- Logs populated here -->
                </div>
            </div>
        </div>
    </div>

    <script>
        let actionChartInstance = null;

        function formatTime(timestamp) {
            return new Date(timestamp * 1000).toLocaleTimeString();
        }

        function getBadgeClass(action) {
            if (action === "allow") return "badge-allow";
            if (action === "block") return "badge-block";
            return "badge-throttle";
        }

        async function fetchData() {
            try {
                const response = await fetch('/api/logs');
                const data = await response.json();
                updateDashboard(data.logs);
            } catch (error) {
                console.error("Failed to fetch logs", error);
            }
        }

        function updateDashboard(logs) {
            if (!logs || logs.length === 0) return;

            document.getElementById("stat-total").innerText = logs.length;

            let allowCount = 0;
            let totalLatency = 0;

            const actionCounts = { 'allow': 0, 'block': 0, 'throttle': 0, 'rate_limit': 0 };
            
            const logContainer = document.getElementById("log-container");
            logContainer.innerHTML = "";

            logs.slice().reverse().forEach((log, index) => {
                const action = log.verdict.action;
                if (action === "allow") allowCount++;
                totalLatency += log.latency_sec;

                if (actionCounts[action] !== undefined) actionCounts[action]++;
                else actionCounts[action] = 1;

                if (index < 50) { // Show last 50
                    const el = document.createElement("div");
                    el.className = "p-3 rounded bg-slate-800/50 flex justify-between items-start text-sm border border-slate-700/50 hover:bg-slate-800 transition-colors group";
                    
                    const feedbackControls = `
                        <div class="mt-2 flex gap-2 opacity-0 group-hover:opacity-100 transition-opacity">
                            <button onclick="submitFeedback('${log.ip}', '${action}', true)" class="px-2 py-1 bg-green-500/20 hover:bg-green-500/30 text-green-400 rounded text-[10px] font-medium border border-green-500/30">✔ Valid Action</button>
                            <button onclick="submitFeedback('${log.ip}', '${action}', false)" class="px-2 py-1 bg-red-500/20 hover:bg-red-500/30 text-red-400 rounded text-[10px] font-medium border border-red-500/30">✖ False Pos/Neg</button>
                        </div>
                    `;

                    el.innerHTML = `
                        <div>
                            <div class="flex items-center gap-2 mb-1">
                                <span class="px-2 py-0.5 rounded text-xs font-semibold ${getBadgeClass(action)} uppercase">${action}</span>
                                <span class="text-slate-400 text-xs">${formatTime(log.timestamp)}</span>
                                <span class="text-slate-500 text-xs font-mono ml-1">${log.ip}</span>
                                <span class="text-blue-300 font-mono text-xs ml-2">Risk: ${log.verdict.risk_score.toFixed(2)}</span>
                            </div>
                            <p class="text-slate-300 text-xs">${log.verdict.reasoning}</p>
                            ${feedbackControls}
                        </div>
                        <div class="text-right flex flex-col items-end gap-1">
                            <span class="text-xs text-slate-500">${(log.latency_sec * 1000).toFixed(1)}ms</span>
                            <div class="flex gap-1 text-[10px] text-slate-400">
                                ${log.signals.anomaly_score > 0.5 ? '<span class="text-orange-400" title="Anomaly">A</span>' : ''}
                                ${log.signals.deviation_score > 0.5 ? '<span class="text-purple-400" title="Deviation">D</span>' : ''}
                                ${log.signals.injection_score > 0.5 ? '<span class="text-red-500" title="Prompt Injection">PI</span>' : ''}
                            </div>
                        </div>
                    `;
                    logContainer.appendChild(el);
                }
            });

            document.getElementById("stat-allow").innerText = ((allowCount / logs.length) * 100).toFixed(1) + "%";
            document.getElementById("stat-block").innerText = (((logs.length - allowCount) / logs.length) * 100).toFixed(1) + "%";
            document.getElementById("stat-latency").innerText = ((totalLatency / logs.length) * 1000).toFixed(1) + "ms";

            updateChart(actionCounts);
        }

        async function submitFeedback(ip, verdict, was_correct) {
            let adminKey = sessionStorage.getItem("sentinel_admin_key");
            if (!adminKey) {
                adminKey = prompt("Admin authentication required.\nEnter Admin Key:");
                if (!adminKey) return;
                sessionStorage.setItem("sentinel_admin_key", adminKey);
            }

            try {
                const response = await fetch('/admin/feedback', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'x-admin-key': adminKey
                    },
                    body: JSON.stringify({ ip, verdict, was_correct })
                });
                
                if (response.status === 401) {
                    sessionStorage.removeItem("sentinel_admin_key");
                    alert("Invalid admin key. Please try again.");
                    return;
                }

                const data = await response.json();
                alert(data.message + "\nNew Settings: " + JSON.stringify(data.new_thresholds));
                fetchData();
            } catch (error) {
                alert("Failed to submit feedback");
            }
        }

        function updateChart(counts) {
            const ctx = document.getElementById('actionChart').getContext('2d');
            
            if (actionChartInstance) {
                actionChartInstance.data.datasets[0].data = [counts.allow, counts.block, counts.throttle + (counts.rate_limit || 0)];
                actionChartInstance.update();
                return;
            }

            actionChartInstance = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['Allow', 'Block', 'Throttle'],
                    datasets: [{
                        data: [counts.allow, counts.block, counts.throttle + (counts.rate_limit || 0)],
                        backgroundColor: ['#34d399', '#f87171', '#fbbf24'],
                        borderWidth: 0,
                        hoverOffset: 4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { position: 'bottom', labels: { color: '#cbd5e1' } }
                    },
                    cutout: '75%'
                }
            });
        }

        // Auto refresh every 3 seconds
        setInterval(fetchData, 3000);
        fetchData();
    </script>
</body>
</html>
